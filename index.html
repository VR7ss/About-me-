<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>VR7</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- شاشة الدخول بخلفية الجبال -->
    <div id="splash-screen">
        <button id="enter-btn">click to enter...</button>
    </div>

    <!-- المحتوى الرئيسي (يظهر بعد النقر) -->
    <div id="main-content" style="display: none;">
        <!-- صورة البروفايل -->
        <img src="https://cdn.discordapp.com/avatars/1196473067258527794/b3f1e322e751a8d139484346414fdfa5.png?size=1024" alt="VR7" class="profile-pic">
        
        <!-- الاسم والوصف -->
        <h1>VR7</h1>
        <p>مطور | مبرمج | صانع محتوى</p>
        
        <!-- المشاهدات -->
        <div class="views">893</div>
        
        <!-- العبارة -->
        <div class="message">Always In My Heart</div>
        
        <!-- أيقونة not allowed -->
        <i class="fas fa-ban not-allowed"></i>
        
        <!-- مشغل الموسيقى (بنفس تنسيق الموقع الأصلي) -->
        <div class="music-player">
            <div class="time">2:44 / 0:02</div>
            <div class="controls">
                <button onclick="playAudio()"><i class="fas fa-play"></i></button>
                <button onclick="pauseAudio()"><i class="fas fa-pause"></i></button>
            </div>
            <audio id="my-audio" src="https://media.discordapp.net/attachments/1241310501036757013/1478898886989840384/7618851728954314930.mp4?ex=69aa136b&is=69a8c1eb&hm=7c65055cd6bc8d11a4e3d97a83fd9fc8e621d4394f8057be14439da470af173b&"></audio>
        </div>

        <!-- روابط التواصل الاجتماعي (تحت مشغل الموسيقى) -->
        <div class="social-links">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
