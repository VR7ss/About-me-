<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>About - VR7</title>
    <link rel="stylesheet" href="style.css">
    <!-- مكتبة أيقونات Font Awesome للتواصل الاجتماعي -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- شاشة الدخول -->
    <div id="splash-screen">
        <button id="enter-btn">click to enter...</button>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="main-content" style="display: none;">
        <!-- الصورة الشخصية في الأعلى -->
        <img src="https://cdn.discordapp.com/avatars/1196473067258527794/b3f1e322e751a8d139484346414fdfa5.png?size=1024" alt="VR7" class="profile-pic">
        
        <!-- الاسم والوصف -->
        <h1>VR7</h1>
        <p>مطور | مبرمج | صانع محتوى</p>
        
        <!-- قسم الشريط السفلي (العبارة، الأيقونة، المشاهدات) -->
        <div class="status-bar">
            <!-- العبارة النصية -->
            <span class="heart-message">❤️ Always In My Heart</span>
            
            <!-- أيقونة "not allowed" (قفل) -->
            <i class="fas fa-lock not-allowed-icon"></i>
            
            <!-- عداد المشاهدات -->
            <div class="viewer-box">
                👁️ <span id="viewer-count">0</span>
            </div>
        </div>
        
        <!-- روابط التواصل الاجتماعي -->
        <div class="social-links">
            <a href="https://instagram.com/sloveu_" target="_blank" class="social-icon">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://discord.com/users/1196473067258527794" target="_blank" class="social-icon">
                <i class="fab fa-discord"></i>
            </a>
            <a href="https://youtube.com/@_vr7?si=cEFM_d7SsjaxlvJi" target="_blank" class="social-icon">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
        
        <!-- مشغل الموسيقى -->
        <div class="music-player">
            <audio id="my-audio" src="https://media.discordapp.net/attachments/1241310501036757013/1478898886989840384/7618851728954314930.mp4?ex=69aa136b&is=69a8c1eb&hm=7c65055cd6bc8d11a4e3d97a83fd9fc8e621d4394f8057be14439da470af173b&"></audio>
            
            <div class="player-controls">
                <button onclick="playAudio()"><i class="fas fa-play"></i></button>
                <button onclick="pauseAudio()"><i class="fas fa-pause"></i></button>
            </div>
            
            <!-- شريط الوقت (ثابت كمثال) -->
            <div class="time-display">
                <span id="current-time">0:01</span> / <span id="duration">2:44</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
