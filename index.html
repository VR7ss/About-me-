<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Djn</title>
    <meta name="description" content="صفحتي الشخصية — روابطي وحساباتي في مكان واحد">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&family=Tajawal:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ======= SPLASH SCREEN ======= -->
    <div id="splash" class="splash">
        <video class="splash-bg" autoplay loop muted playsinline preload="auto" poster="88.png">
            <source src="1v.mp4" type="video/mp4">
        </video>
        <div class="splash-content">
            <span id="enterBtn" class="splash-text">click to enter...</span>
        </div>
    </div>

    <!-- ======= BACKGROUND ======= -->
    <div class="bg-layer">
        <video id="bgVideo" class="bg-image" autoplay loop muted playsinline preload="auto" poster="88.png">
            <source src="1v.mp4" type="video/mp4">
        </video>
        <div class="dot-overlay"></div>
    </div>

    <!-- ======= FLOATING PARTICLES ======= -->
    <div class="particles-container" id="particles"></div>

    <!-- ======= MUSIC TOGGLE ======= -->
    <button id="musicToggle" class="music-toggle" aria-label="Toggle Music">
        <i class="fas fa-volume-up"></i>
    </button>

    <!-- ======= HIDDEN AUDIO ======= -->
    <audio id="bgMusic" loop preload="auto">
        <source src="1m.mp3" type="audio/mpeg">
    </audio>

    <!-- ======= MAIN CONTENT ======= -->
    <main class="main-container">
        <div class="profile-section">

            <!-- Profile Header -->
            <div class="profile-header fade-element">
                <div class="avatar-ring">
                    <div class="avatar">
                        <img src="avatar.jpg" alt="صورتي">
                    </div>
                </div>
                <div class="profile-info">
                    <div class="name-row">
                        <div class="neon-name-wrapper">
                            <h1 class="username">Djn</h1>
                            <span class="name-particle"></span>
                            <span class="name-particle"></span>
                            <span class="name-particle"></span>
                            <span class="name-particle"></span>
                            <span class="name-particle"></span>
                            <span class="name-particle"></span>
                            <span class="name-particle"></span>
                            <span class="name-particle"></span>
                        </div>
                        <span class="verified-badge" title="Premium">
                            <i class="fas fa-crown"></i>
                        </span>
                    </div>
                    <p class="bio">مطور | مبرمج | صانع محتوى</p>
                </div>
            </div>

            <!-- Social Icons Row -->
            <div class="social-icons fade-element">
                <a href="https://discordapp.com/users/908070624675635200" class="social-icon" id="icon-discord"
                    target="_blank" title="Discord">
                    <i class="fab fa-discord"></i>
                </a>
                <a href="https://www.instagram.com/9.7.5.4.3.2/#" class="social-icon" id="icon-instagram"
                    target="_blank" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.tiktok.com/@8.iz_i?is_from_webapp=1&sender_device=pc" class="social-icon"
                    id="icon-tiktok" target="_blank" title="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>

            <!-- Stats Bar -->
            <div class="stats-bar fade-element">
                <div class="stat-item">
                    <i class="fas fa-eye"></i>
                    <span>893</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <i class="fas fa-map-pin"></i>
                    <span>Always In My Heart</span>
                </div>
            </div>

            <!-- Music Player -->
            <div class="music-player fade-element">
                <div class="player-info">
                    <div class="player-avatar">
                        <img src="avatar.jpg" alt="track">
                    </div>
                    <div class="player-text">
                        <span class="track-name" id="trackName">not allowed</span>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="time-row">
                            <span class="time-current" id="timeCurrent">0:00</span>
                            <span class="time-total" id="timeTotal">0:00</span>
                        </div>
                    </div>
                </div>
                <div class="player-controls">
                    <button class="ctrl-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                    <button class="ctrl-btn play-btn" id="playPauseBtn"><i class="fas fa-pause"
                            id="playPauseIcon"></i></button>
                    <button class="ctrl-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
